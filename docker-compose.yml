# ============================================================
# 基础 Compose 文件 — 公共服务骨架
# 
# 使用方式（开发）：docker compose up --watch
#   自动加载 docker-compose.override.yml，代码改动秒级同步
#
# 使用方式（生产）：
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ==========================================================
  # PHP-FPM 应用服务
  # ==========================================================
  php:
    # ── 构建配置：用项目的 Dockerfile 构建镜像 ──
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp-php
    working_dir: /var/www/html

    # ── develop.watch：监听宿主机文件变更，自动同步到容器 ──
    # ── 替代传统的 bind mount，Windows 上 IO 性能更好 ──
    develop:
      watch:
        - action: sync          # action: sync = 仅同步变更文件
          path: .               # 监听当前目录
          target: /var/www/html # 同步到容器的这个路径

    # ── 日志配置：JSON 格式 + 轮转限制，防止撑爆磁盘 ──
    logging:
      driver: json-file         # 每条日志存为一行 JSON
      options:
        max-size: "10m"         # 单文件超过 10MB 自动轮转
        max-file: "3"           # 最多保留 3 个历史文件

    # ── 健康检查：每 30 秒确认 php-fpm 进程存活 ──
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 30s             # 检查间隔
      timeout: 10s              # 单次超时
      retries: 3                # 连续失败 3 次才标记 unhealthy
      start_period: 5s          # 启动后等 5 秒再开始检查

    # ── 配置文件挂载（Bind Mount）──
    volumes:
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf

    # ── 加入自定义网络，容器间通过服务名互访（如 mysql / redis）──
    networks:
      - app-network


  # ==========================================================
  # Nginx 反向代理服务
  # ==========================================================
  nginx:
    image: nginx:1.27-alpine    # 直接用官方轻量镜像，无需构建
    container_name: myapp-nginx

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD-SHELL", "pidof nginx || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    # ── depends_on + service_healthy：等 PHP 健康检查通过才启动 Nginx ──
    depends_on:
      php:
        condition: service_healthy

    networks:
      - app-network


  # ==========================================================
  # MySQL 数据库服务
  # ==========================================================
  mysql:
    image: mysql:8.0
    container_name: myapp-mysql

    # ── 使用旧版认证插件（兼容老版本 PHP mysqli 驱动）──
    command: --default-authentication-plugin=mysql_native_password

    # ── 环境变量从 .env 文件读取，敏感信息不硬编码 ──
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s          # MySQL 启动慢，给 20 秒预热

    # ── 命名卷持久化数据（容器删除后数据不丢）──
    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - app-network


  # ==========================================================
  # Redis 缓存服务
  # ==========================================================
  redis:
    image: redis:7-alpine
    container_name: myapp-redis

    # ── requirepass：启动时设置访问密码 ──
    command: redis-server --requirepass ${REDIS_PASSWORD}

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # ── 注入密码环境变量，供 healthcheck 使用 ──
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    networks:
      - app-network


  # ==========================================================
  # Adminer — MySQL 网页管理工具（仅调试时启动）
  # ==========================================================
  # ── profiles: ["debug"] 表示此服务默认不启动 ──
  # ── 需要时运行：docker-compose --profile debug up -d ──
  # ── 访问地址：http://localhost:8081 ──
  adminer:
    image: adminer:latest
    container_name: myapp-adminer
    profiles:
      - debug                   # 默认不启动，需显式 --profile debug
    ports:
      - "8081:8080"             # 宿主机 8081 → 容器 8080
    environment:
      ADMINER_DEFAULT_SERVER: mysql  # 登录页默认选 MySQL
    networks:
      - app-network


# ============================================================
# 网络配置
# ============================================================
# ── app-network：自定义 bridge 网络 ──
# ── 驱动 bridge = 默认桥接模式，加入此网络的容器可以：
# ──   1. 通过容器名做 DNS 解析 —— 比如 Nginx 配置 fastcgi_pass php:9000
# ──   2. 互相访问所有端口，无需 -p 端口映射
# ──   3. 与外界隔离，未加入此网络的容器无法访问
# ── 对比默认 bridge（docker0）：不支持 DNS 解析，必须用 IP
# ── 对比 host 模式：直接共享宿主机网络栈，端口冲突风险高
networks:
  app-network:
    driver: bridge


# ============================================================
# 命名卷
# ============================================================
# ── mysql-data：MySQL 数据卷，由 Docker 管理 ──
# ── 存储位置：/var/lib/docker/volumes/myapp_mysql-data/_data
# ── 容器删除后卷仍在，下次启动自动挂回（数据不丢失）
# ── 对比 bind mount（./mysql:/var/lib/mysql）：命名卷性能更好
volumes:
  mysql-data:
