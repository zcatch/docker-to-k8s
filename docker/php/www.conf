; ============================================================
; PHP-FPM 进程池配置（Pool Configuration）
; 此文件挂载到容器的 /usr/local/etc/php-fpm.d/www.conf
; 控制 PHP-FPM 如何管理子进程、接收请求、记录日志
; ============================================================

; ── [www]：进程池名称，"www" 是默认池名 ──
; ── 一台机器可以跑多个池（不同项目、不同用户、不同端口）──
[www]

; ── 进程池运行用户和用户组 ──
; ── www-data 是 Debian/Ubuntu 上 Web 服务的标准用户，权限最小 ──
; ── 绝不能用 root 跑 PHP-FPM（安全红线）──
user = www-data
group = www-data

; ── listen：PHP-FPM 监听地址和端口 ──
; ── 9000 = FastCGI 协议通信端口，Nginx 发请求给这个端口 ──
; ── 也可以写 Unix Socket 路径，比如 /run/php-fpm.sock（同机通信更快）──
listen = 9000

; ── 监听 socket 文件的所有者和组 ──
listen.owner = www-data
listen.group = www-data

; ============================================================
; 进程管理策略（pm = Process Manager）
; 三种模式：static / dynamic / ondemand
; ============================================================

; ── dynamic：动态模式 — 按请求量自动扩缩子进程数 ──
; ── 启动时 fork 出 start_servers 个进程 ──
; ── 空闲时保留 min_spare_servers 个 ──
; ── 忙时最多 fork 到 max_children 个 ──
; ── 适合：大多数 Web 场景，请求量波动大 ──
pm = dynamic

; ── pm.max_children：同时存活的最大子进程数 ──
; ── 这是硬上限，超过后新请求排队等，不会无限 fork ──
; ── 设置公式参考：(容器内存 - 其他服务内存) / 每个 PHP 进程内存 ──
; ── 比如 2G 容器，每个 PHP 进程 40M，大约设 40-50 ──
pm.max_children = 50

; ── pm.start_servers：PHP-FPM 启动时立即 fork 的子进程数 ──
; ── 不用等请求来了才 fork，启动就有 5 个待命 ──
pm.start_servers = 5

; ── pm.min_spare_servers：空闲时最少保留几个进程待命 ──
; ── 低于这个数会自动补到 start_servers 级别 ──
pm.min_spare_servers = 3

; ── pm.max_spare_servers：空闲时最多保留几个进程 ──
; ── 超过这个数会自动 kill 掉多余的，释放内存 ──
pm.max_spare_servers = 10

; ============================================================
; 进程生命周期与监控
; ============================================================

; ── pm.max_requests：每个子进程处理多少个请求后自动重启 ──
; ── 作用：防止 PHP 应用内存泄漏长期累积 ──
; ── 设为 0 = 永不自动重启 ──
; ── 1000 是个平衡值：够大减少重启开销，够小阻止内存膨胀 ──
pm.max_requests = 1000

; ── pm.status_path：FPM 状态监控页面的 URL 路径 ──
; ── 访问 http://host/fpm-status 可以看到进程池实时状态 ──
; ── 包括：活跃进程数、空闲进程数、请求队列长度、慢请求数 ──
pm.status_path = /fpm-status

; ── ping.path：FPM 存活检测路径 ──
; ── 访问 http://host/fpm-ping 返回 pong，用于健康检查 ──
; ── K8s / Docker healthcheck 可以 curl 这个路径判断 FPM 是否活着 ──
ping.path = /fpm-ping

; ── slowlog：慢请求日志文件路径 ──
; ── 执行时间超过 request_slowlog_timeout 的请求会记录到这里 ──
; ── 日志包含完整的函数调用栈，排查性能瓶颈的神器 ──
slowlog = /var/log/php/slow.log

; ── request_slowlog_timeout：超过多少秒就算"慢请求" ──
; ── 5s = 一个请求执行超过 5 秒就记录到 slowlog ──
request_slowlog_timeout = 5s

; ── php_admin_value / php_admin_flag ──
; ── 在 FPM 层面强制覆盖 PHP 配置（代码里 ini_set() 也改不了）──
; ── php_admin_value 设字符串值 ──
; ── php_admin_flag 设 on/off 开关值 ──
php_admin_value[error_log] = /var/log/php/error.log
php_admin_flag[log_errors] = on
