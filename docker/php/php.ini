; ============================================================
; PHP 自定义运行时配置
; 此文件挂载到容器的 /usr/local/etc/php/conf.d/custom.ini
; PHP 启动时自动加载 conf.d 目录下所有 .ini 文件
; ============================================================

; ── [PHP]：PHP 核心配置节（INI 文件通过方括号分段）──
[PHP]

; ── upload_max_filesize：单文件上传最大体积，100M 覆盖默认的 2M ──
upload_max_filesize = 100M

; ── post_max_size：POST 请求体最大体积（含文件 + 表单数据）──
; ── 必须 >= upload_max_filesize，否则大文件上传会失败 ──
post_max_size = 100M

; ── max_execution_time：单个 PHP 脚本最长执行时间（秒）──
; ── 300 秒 = 5 分钟，适合数据处理、导出等耗时任务 ──
; ── 设为 0 表示无限制（不推荐，可能导致进程永不释放）──
max_execution_time = 300

; ── max_input_time：PHP 接收请求数据（POST/上传）的最长等待时间（秒）──
max_input_time = 300

; ── memory_limit：单个 PHP 进程最大内存占用 ──
; ── 512M 适合处理大图片、Excel 导入等场景 ──
; ── 设为 -1 表示无限制（危险，内存泄漏会撑爆整个容器）──
memory_limit = 512M

; ── display_errors：是否在页面上直接显示错误信息 ──
; ── Off = 生产环境必须关闭（避免暴露代码路径、数据库结构等敏感信息）──
; ── On  = 开发调试时可临时打开 ──
display_errors = On

; ── log_errors：是否将错误写入日志文件 ──
; ── On = 生产环境必须开启，错误信息记录到 error_log 指定的文件 ──
log_errors = On

; ── error_log：错误日志文件路径 ──
error_log = /var/log/php/error.log

; ── date.timezone：PHP 默认时区 ──
; ── 不设置的话每个 date() 调用都会抛 E_WARNING ──
date.timezone = Asia/Shanghai

; ── default_socket_timeout：socket 连接超时时间（秒）──
; ── 影响 file_get_contents(url)、Redis/MySQL 连接等 ──
default_socket_timeout = 300


; ============================================================
; OPcache — PHP 字节码缓存
; 原理：PHP 每次执行前要先把 .php 源码编译为字节码(opcode)
;       OPcache 把这个编译结果缓存到共享内存里
;       下次请求同一文件时直接用缓存，跳过编译步骤
; 效果：生产环境 QPS 提升 2-5 倍，CPU 占用降低 30-50%
; ============================================================

; ── [opcache]：OPcache 配置节 ──
[opcache]

; ── 总开关：1 = 启用，0 = 禁用 ──
opcache.enable=1

; ── 共享内存大小（MB），存编译好的字节码 ──
; ── 128MB 足够缓存约 4000 个 PHP 文件 ──
opcache.memory_consumption=128

; ── 预留内存存字符串（类名、函数名、变量名等），单位 MB ──
opcache.interned_strings_buffer=8

; ── 最多缓存多少个 PHP 文件的字节码 ──
opcache.max_accelerated_files=4000

; ── validate_timestamps：是否检查源文件是否被修改过 ──
; ── 1 = 检查（开发环境用，改代码立即生效）──
; ── 0 = 不检查（生产环境用，省掉 stat 系统调用，性能最优）──
; ── 设为 0 时改代码必须重启 PHP-FPM 或清缓存才生效 ──
opcache.validate_timestamps=1

; ── save_comments：是否保留代码中的注释和注解 ──
; ── 1 = 保留（使用 Doctrine/ Symfony 注解时必须开启）──
; ── 0 = 丢弃（省内存，但注解功能会失效）──
opcache.save_comments=1
